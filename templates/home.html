<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .login { width: 500px; margin: 50px auto; padding: 30px; background: white; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); }
        .placeholder { color: #6c757d; }
    </style>
</head>
<body>
    <div class="login">
       <h1>Store Sales Predictor</h1>
   
       <form action="{{ url_for('predict_datapoint')}}" method="post">
        <h1>
            <legend>Sales Forecasting Input</legend>
        </h1>

        <div class="mb-3">
            <label class="form-label">Store Number</label>
            <input class="form-control" type="number" name="store_nbr" placeholder="Enter Store Number (1-54)" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Product Family</label>
            <select class="form-control" name="family" required>
                <option class="placeholder" selected disabled value="">Select Product Category</option>
                <option value="BEVERAGES">Beverages</option>
                <option value="GROCERY I">Grocery I</option>
                <option value="CLEANING">Cleaning</option>
                <option value="DAIRY">Dairy</option>
                <option value="POULTRY">Poultry</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Items on Promotion</label>
            <input class="form-control" type="number" name="onpromotion" placeholder="Number of items on promo" min='0' required />
        </div>

        <div class="mb-3">
            <label class="form-label">Daily Oil Price (WTI)</label>
            <input class="form-control" type="number" step="0.01" name="dcoilwtico" placeholder="e.g. 75.50" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Daily Transactions</label>
            <input class="form-control" type="number" name="transactions" placeholder="Expected transactions" required />
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">City</label>
                <input class="form-control" type="text" name="city" placeholder="City Name" required />
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">State</label>
                <input class="form-control" type="text" name="state" placeholder="State Name" required />
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Store Type</label>
                <select class="form-control" name="type" required>
                    <option value="A">Type A</option>
                    <option value="B">Type B</option>
                    <option value="C">Type C</option>
                    <option value="D">Type D</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Cluster</label>
                <input class="form-control" type="number" name="cluster" placeholder="Cluster ID" required />
            </div>
        </div>

       <div class="mb-3">
            <label class="form-label">Is it a Holiday?</label>
            <select class="form-control" name="all_holiday" required>
                <option value="Other">Work Day</option>
                <option value="Holidays">Yes (Public Holiday)</option>
                <option value="Entertainment">Entertainment (e.g. Black Friday/World Cup)</option>
                <option value="Earthquake">Earthquake Impact Period</option>
                <option value="Foundation_Provincialization_Independence">Local Foundation/Independence Day</option>
            </select>
       </div>

        <div class="mb-3">
            <input class="btn btn-primary w-100" type="submit" value="Predict Daily Sales" />
        </div>
    </form>

    <h2 class="text-center mt-4">
        The Predicted Sales: <span class="badge bg-success">{{results}}</span>
    </h2>
    </div>
</body>
</html>
